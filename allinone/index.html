<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monkeytype All-in-One: Generate -> Analyze -> Send</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/object-hash@3.0.0/dist/object_hash.min.js"></script>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #323437;
        color: #d1d0c5;
        margin: 0;
        padding: 40px 20px;
        box-sizing: border-box;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
      }
      h1 {
        color: #e2b714;
        text-align: center;
        margin-bottom: 30px;
        font-size: 2.2rem;
      }
      .step {
        background: #2c2e31;
        margin-bottom: 25px;
        padding: 30px;
        border-radius: 12px;
        border-left: 5px solid #e2b714;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        transition: opacity 0.3s ease;
      }
      .step h2 {
        margin-top: 0;
        color: #e2b714;
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #3c3e42;
        padding-bottom: 15px;
        margin-bottom: 25px;
      }
      .btn {
        background: #e2b714;
        color: #323437;
        border: none;
        padding: 12px 25px;
        font-size: 1.1rem;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
        white-space: nowrap;
      }
      .btn:hover {
        background: #f0c626;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(226, 183, 20, 0.3);
      }
      .btn:disabled {
        background: #646669;
        color: #2c2e31;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
        opacity: 0.7;
      }
      .btn-secondary {
        background: #646669;
        color: #d1d0c5;
        display: inline-block;
        margin-bottom: 15px;
      }
      .btn-secondary:hover {
        background: #7a7d81;
      }
      .input-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 25px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      label {
        font-size: 0.95rem;
        color: #a1a3a6;
        font-weight: bold;
      }
      input,
      select,
      textarea {
        background: #323437;
        color: #d1d0c5;
        border: 1px solid #4a4c50;
        padding: 12px;
        border-radius: 8px;
        font-family: inherit;
        font-size: 1rem;
        width: 100%;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }
      textarea {
        resize: vertical;
        min-height: 120px;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #e2b714;
      }
      .result-box {
        background: #1e1e20;
        padding: 20px;
        border-radius: 8px;
        font-family: monospace;
        white-space: pre-wrap;
        overflow-y: auto;
        max-height: 400px;
        display: none;
        font-size: 0.9rem;
        line-height: 1.5;
        color: #a1a3a6;
        border-left: 4px solid #646669;
      }

      .anticheat-score {
        font-size: 2.2rem;
        text-align: center;
        margin: 20px 0 30px;
        font-weight: bold;
        padding: 20px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.2);
      }
      .score-pass {
        color: #5fd068;
        text-shadow: 0 0 10px rgba(95, 208, 104, 0.3);
      }
      .score-fail {
        color: #ca4754;
        text-shadow: 0 0 10px rgba(202, 71, 84, 0.3);
      }

      .stats-row {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
        margin-bottom: 25px;
      }
      .stat-badge {
        background: #323437;
        padding: 15px 20px;
        border-radius: 8px;
        text-align: center;
        flex: 1;
        min-width: 140px;
        border: 1px solid #4a4c50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .stat-val {
        font-size: 1.8rem;
        font-weight: bold;
        color: #e2b714;
        line-height: 1;
      }
      .stat-lbl {
        font-size: 0.85rem;
        color: #646669;
        text-transform: uppercase;
        margin-top: 8px;
        font-weight: bold;
        letter-spacing: 0.5px;
      }

      .hidden {
        display: none !important;
      }
      .server-success {
        border-left-color: #5fd068 !important;
      }
      .server-error {
        border-left-color: #ca4754 !important;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🐒 Monkeytype Auto-Bypass</h1>

      <!-- STEP 1: GENERATE -->
      <div class="step" id="step1">
        <h2>1. Payload Settings</h2>
        <div class="input-grid">
          <div class="form-group">
            <label>Target WPM</label
            ><input type="number" id="targetWpm" value="95" step="1" />
          </div>
          <div class="form-group">
            <label>Duration (s)</label>
            <select id="testDuration">
              <option value="15">15 seconds</option>
              <option value="30">30 seconds</option>
              <option value="60">60 seconds</option>
              <option value="120">120 seconds</option>
            </select>
          </div>
          <div class="form-group">
            <label>Accuracy Target (%)</label
            ><input type="number" id="targetAcc" value="96" step="0.1" />
          </div>
          <div class="form-group">
            <label>Language</label
            ><input type="text" id="targetLang" value="english" />
          </div>
          <div class="form-group">
            <label>Monkeytype UID (Optional)</label
            ><input
              type="text"
              id="uid"
              placeholder="Leave empty for generic"
            />
          </div>
        </div>
        <button class="btn" id="btnGenerate" style="width: 100%">
          Create Payload &rarr;
        </button>
      </div>

      <!-- STEP 2: ANALYZE -->
      <div class="step" id="step2" style="opacity: 0.3; pointer-events: none">
        <h2>2. Anticheat Verification</h2>

        <div id="analysisResult" class="hidden">
          <div class="anticheat-score" id="acScore">--</div>

          <div class="stats-row">
            <div class="stat-badge">
              <div class="stat-val" id="av-wpm">--</div>
              <div class="stat-lbl">WPM Expected</div>
            </div>
            <div class="stat-badge">
              <div class="stat-val" id="av-cons">--</div>
              <div class="stat-lbl">Consistency</div>
            </div>
            <div class="stat-badge">
              <div class="stat-val" id="av-cv">--</div>
              <div class="stat-lbl">Spacing CV</div>
            </div>
            <div class="stat-badge">
              <div class="stat-val" id="av-flags">--</div>
              <div class="stat-lbl">Cheat Flags</div>
            </div>
          </div>

          <button class="btn btn-secondary" id="btnViewPayload">
            Show JSON Payload
          </button>
          <div
            id="payloadOutput"
            class="result-box"
            style="margin-bottom: 25px"
          ></div>

          <button class="btn" id="btnProceedSend" style="width: 100%">
            Looks Good! Proceed to Sender &rarr;
          </button>
        </div>
      </div>

      <!-- STEP 3: SEND -->
      <div class="step" id="step3" style="opacity: 0.3; pointer-events: none">
        <h2>3. Relay via Proxy</h2>
        <div class="form-group" style="margin-bottom: 25px">
          <label>Bearer Token (JWT Authorization)</label>
          <textarea id="tokenInput" placeholder="eyJhbGciOi..."></textarea>
        </div>
        <button class="btn" id="btnSend" style="width: 100%" disabled>
          Simulate Request to Monkeytype
        </button>
        <div
          id="serverOutput"
          class="result-box"
          style="margin-top: 25px"
        ></div>
      </div>
    </div>

    <script src="../payload-generator/generator.js"></script>
    <script src="../anticheat-demo/anticheat.js"></script>
    <script>
      // App State
      const App = {
        payload: null,
        acAnalyzer: new AnticheatAnalyzer(),
      };

      // Elements
      const UI = {
        btnGenerate: document.getElementById("btnGenerate"),
        btnProceedSend: document.getElementById("btnProceedSend"),
        btnSend: document.getElementById("btnSend"),
        btnViewPayload: document.getElementById("btnViewPayload"),
        step2: document.getElementById("step2"),
        step3: document.getElementById("step3"),
        analysisResult: document.getElementById("analysisResult"),
        acScore: document.getElementById("acScore"),
        payloadOutput: document.getElementById("payloadOutput"),
        serverOutput: document.getElementById("serverOutput"),
      };

      // Step 1: Generate Payload
      UI.btnGenerate.addEventListener("click", () => {
        const config = {
          targetWpm: parseFloat(document.getElementById("targetWpm").value),
          testDuration: parseInt(document.getElementById("testDuration").value),
          mode: "time",
          targetAcc: parseFloat(document.getElementById("targetAcc").value),
          language: document.getElementById("targetLang").value,
          uid: document.getElementById("uid").value,
        };

        // Call generator logic natively
        const generatorInstance = new HumanTypingGenerator();
        const { result } = generatorInstance.generate(config);

        // Hash exactly like the real CLI does, mimicking the server
        if (typeof objectHash !== "undefined") {
          const toHash = { ...result };
          delete toHash.hash;
          result.hash = objectHash(toHash);
        }

        App.payload = result;

        // Enable Step 2
        UI.step2.style.opacity = 1;
        UI.step2.style.pointerEvents = "auto";
        UI.analysisResult.classList.remove("hidden");

        // Verify Against Offline Anticheat
        const analysis = App.acAnalyzer.analyze({ result }); // anticheat expects { result: payload } or payload

        // Update DOM
        if (analysis.isBanned || !analysis.isHuman) {
          UI.acScore.innerHTML = "🚨 FAILED (BOT DETECTED) 🚨";
          UI.acScore.className = "anticheat-score score-fail";
          UI.btnProceedSend.innerHTML =
            "Send Anyway (Insta-Ban Warning) &rarr;";
          UI.btnProceedSend.style.background = "#ca4754";
        } else {
          UI.acScore.innerHTML = "✅ PASSED (HUMAN VERIFIED) ✅";
          UI.acScore.className = "anticheat-score score-pass";
          UI.btnProceedSend.innerHTML = "Looks Good! Proceed to Sender &rarr;";
          UI.btnProceedSend.style.background = "#e2b714";
        }

        document.getElementById("av-wpm").innerText = analysis.wpm.toFixed(2);
        document.getElementById("av-cons").innerText =
          analysis.consistency.toFixed(2) + "%";
        document.getElementById("av-cv").innerText =
          analysis.statistics.spacingCV.toFixed(3);
        document.getElementById("av-flags").innerText = analysis.flags.length;

        UI.payloadOutput.innerText = JSON.stringify(result, null, 2);

        // Jump to Step 2
        UI.step2.scrollIntoView({ behavior: "smooth", block: "start" });
      });

      // View Payload Toggle
      UI.btnViewPayload.addEventListener("click", () => {
        const p = UI.payloadOutput;
        const isHidden = p.style.display !== "block";
        p.style.display = isHidden ? "block" : "none";
        UI.btnViewPayload.innerText = isHidden
          ? "Hide JSON Payload"
          : "Show JSON Payload";
      });

      // Step 2 -> Step 3
      UI.btnProceedSend.addEventListener("click", () => {
        UI.step3.style.opacity = 1;
        UI.step3.style.pointerEvents = "auto";
        UI.btnSend.disabled = false;

        // Jump and focus token
        UI.step3.scrollIntoView({ behavior: "smooth", block: "start" });
        const tokenInput = document.getElementById("tokenInput");
        if (!tokenInput.value) tokenInput.focus();
      });

      // Step 3 (Send Post via proxy.php)
      UI.btnSend.addEventListener("click", async () => {
        if (!App.payload)
          return alert("No payload available. Please generate first.");
        const token = document.getElementById("tokenInput").value.trim();
        if (!token)
          return alert("Cannot send without an Authorization bearer token!");

        UI.btnSend.disabled = true;
        UI.btnSend.innerHTML = "Connecting to Proxy...";

        UI.serverOutput.style.display = "block";
        UI.serverOutput.className = "result-box"; // Reset bounds
        UI.serverOutput.innerText =
          "Transmitting POST query directly to proxy.php wrapper...";

        try {
          const response = await fetch("../replay_tool/proxy.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: token, payload: App.payload }),
          });

          const data = await response.text();
          const cleanData = data;

          UI.serverOutput.innerHTML = `HTTP Status: <b>${response.status}</b>\n\nResponse:\n${cleanData}`;

          if (response.status >= 200 && response.status < 300) {
            UI.serverOutput.classList.add("server-success");
            UI.btnSend.innerHTML = "Success!";
          } else {
            UI.serverOutput.classList.add("server-error");
            UI.btnSend.innerHTML = "Rejected!";
          }
        } catch (e) {
          UI.serverOutput.innerText = `Network Error: ${e.message}`;
          UI.serverOutput.classList.add("server-error");
          UI.btnSend.innerHTML = "Network Error!";
        } finally {
          setTimeout(() => {
            UI.btnSend.disabled = false;
            UI.btnSend.innerHTML = "Simulate Request to Monkeytype";
          }, 3000);
        }
      });
    </script>
  </body>
</html>
