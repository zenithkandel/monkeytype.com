<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monkeytype All-in-One: Generate -> Analyze -> Send</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/object-hash@3.0.0/dist/object_hash.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #323437; color: #d1d0c5; margin: 0; padding: 40px 20px; box-sizing: border-box; }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { color: #e2b714; text-align: center; margin-bottom: 30px; font-size: 2.2rem; }
    .step { background: #2c2e31; margin-bottom: 25px; padding: 30px; border-radius: 12px; border-left: 5px solid #e2b714; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: opacity 0.3s ease; }
    .step h2 { margin-top: 0; color: #e2b714; font-size: 1.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #3c3e42; padding-bottom: 15px; margin-bottom: 25px; }
    .btn { background: #e2b714; color: #323437; border: none; padding: 12px 25px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; white-space: nowrap; }
    .btn:hover { background: #f0c626; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(226, 183, 20, 0.3); }
    .btn:disabled { background: #646669; color: #2c2e31; cursor: not-allowed; transform: none; box-shadow: none; opacity: 0.7; }
    .btn-secondary { background: #646669; color: #d1d0c5; display: inline-block; margin-bottom: 15px; }
    .input-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 0.95rem; color: #a1a3a6; font-weight: bold; }
    input, select, textarea { background: #323437; color: #d1d0c5; border: 1px solid #4a4c50; padding: 12px; border-radius: 8px; font-family: inherit; font-size: 1rem; width: 100%; box-sizing: border-box; }
    textarea { resize: vertical; min-height: 120px; }
    .result-box { background: #1e1e20; padding: 20px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; overflow-y: auto; max-height: 400px; display: none; font-size: 0.9rem; line-height: 1.5; color: #a1a3a6; border-left: 4px solid #646669; }
    .anticheat-score { font-size: 2.2rem; text-align: center; margin: 20px 0 30px; font-weight: bold; padding: 20px; border-radius: 8px; background: rgba(0,0,0,0.2); }
    .score-pass { color: #5fd068; text-shadow: 0 0 10px rgba(95, 208, 104, 0.3); }
    .score-fail { color: #ca4754; text-shadow: 0 0 10px rgba(202, 71, 84, 0.3); }
    .stats-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
    .stat-badge { background: #323437; padding: 15px 20px; border-radius: 8px; text-align: center; flex: 1; min-width: 140px; border: 1px solid #4a4c50; }
    .stat-val { font-size: 1.8rem; font-weight: bold; color: #e2b714; }
    .stat-lbl { font-size: 0.85rem; color: #646669; text-transform: uppercase; margin-top: 8px; font-weight: bold; }
    .hidden { display: none !important; }
    .server-success { border-left-color: #5fd068 !important; }
    .server-error { border-left-color: #ca4754 !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐒 Monkeytype Auto-Bypass</h1>
    <div class="step" id="step1">
      <h2>1. Payload Settings</h2>
      <div class="input-grid">
        <div class="form-group"><label>Target WPM</label><input type="number" id="targetWpm" value="95" step="1"></div>
        <div class="form-group"><label>Duration (s)</label>
          <select id="testDuration">
            <option value="15">15 seconds</option>
            <option value="30">30 seconds</option>
            <option value="60">60 seconds</option>
            <option value="120">120 seconds</option>
          </select>
        </div>
        <div class="form-group"><label>Accuracy Target (%)</label><input type="number" id="targetAcc" value="96" step="0.1"></div>
        <div class="form-group"><label>Language</label><input type="text" id="targetLang" value="english"></div>
        <div class="form-group"><label>UID (Optional)</label><input type="text" id="uid" placeholder="Leave empty for generic"></div>
      </div>
      <button class="btn" id="btnGenerate" style="width: 100%;">Create Payload &rarr;</button>
    </div>
    <div class="step" id="step2" style="opacity: 0.3; pointer-events: none;">
      <h2>2. Anticheat Verification</h2>
      <div id="analysisResult" class="hidden">
        <div class="anticheat-score" id="acScore">--</div>
        <div class="stats-row">
          <div class="stat-badge"><div class="stat-val" id="av-wpm">--</div><div class="stat-lbl">WPM Expected</div></div>
          <div class="stat-badge"><div class="stat-val" id="av-cons">--</div><div class="stat-lbl">Consistency</div></div>
          <div class="stat-badge"><div class="stat-val" id="av-cv">--</div><div class="stat-lbl">Spacing CV</div></div>
          <div class="stat-badge"><div class="stat-val" id="av-flags">--</div><div class="stat-lbl">Cheat Flags</div></div>
        </div>
        <button class="btn btn-secondary" id="btnViewPayload">Show JSON Payload</button>
        <div id="payloadOutput" class="result-box" style="margin-bottom: 25px;"></div>
        <button class="btn" id="btnProceedSend" style="width: 100%;">Looks Good! Proceed to Sender &rarr;</button>
      </div>
    </div>
    <div class="step" id="step3" style="opacity: 0.3; pointer-events: none;">
      <h2>3. Relay via Proxy</h2>
      <div class="form-group" style="margin-bottom: 25px;">
        <label>Bearer Token (JWT Authorization)</label>
        <textarea id="tokenInput" placeholder="eyJhbGciOi..."></textarea>
      </div>
      <button class="btn" id="btnSend" style="width: 100%;" disabled>Simulate Request to Monkeytype</button>
      <div id="serverOutput" class="result-box" style="margin-top: 25px;"></div>
    </div>
  </div>
  <script src="../payload-generator/generator.js"></script>
  <script src="../anticheat-demo/anticheat.js"></script>
  <script src="app.js"></script>
</body>
</html>
