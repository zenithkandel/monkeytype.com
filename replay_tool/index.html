<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MT Replay Tool</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>MT Replay Tool</h1>
        <p>Load JSON data or fill out the form manually to test the API.</p>
      </header>

      <div class="controls">
        <div class="file-upload">
          <label for="jsonFile">Load from JSON:</label>
          <input type="file" id="jsonFile" accept=".json" />
        </div>
        <div
          class="missing-fields"
          id="missingFieldsMsg"
          style="display: none"
        ></div>
      </div>

      <form id="replayForm">
        <h3>Authorization</h3>
        <div class="form-group full-width">
          <label for="token">Bearer Token (JWT) *</label>
          <textarea id="token" required placeholder="eyJhbGciOi..."></textarea>
        </div>

        <h3>Payload (Result Object)</h3>
        <div class="form-grid">
          <!-- Data fields -->
          <div class="form-group">
            <label>WPM</label
            ><input type="number" step="0.01" id="wpm" required />
          </div>
          <div class="form-group">
            <label>Raw WPM</label
            ><input type="number" step="0.01" id="rawWpm" required />
          </div>
          <div class="form-group">
            <label>Char Stats (comma sep)</label
            ><input
              type="text"
              id="charStats"
              required
              placeholder="e.g. 111,0,0,0"
            />
          </div>
          <div class="form-group">
            <label>Char Total</label
            ><input type="number" id="charTotal" required />
          </div>
          <div class="form-group">
            <label>Accuracy</label
            ><input type="number" step="0.01" id="acc" required />
          </div>

          <div class="form-group">
            <label>Mode</label
            ><input type="text" id="mode" required placeholder="e.g. time" />
          </div>
          <div class="form-group">
            <label>Mode 2</label
            ><input type="text" id="mode2" required placeholder="e.g. 15" />
          </div>
          <div class="form-group">
            <label>Language</label
            ><input
              type="text"
              id="language"
              required
              placeholder="e.g. english"
            />
          </div>
          <div class="form-group">
            <label>Difficulty</label
            ><input
              type="text"
              id="difficulty"
              required
              placeholder="e.g. normal"
            />
          </div>

          <div class="form-group full-width timestamp-group">
            <label>Timestamp</label>
            <div class="ts-controls">
              <input type="number" id="timestamp" required />
              <button type="button" id="btnNow">Set Now</button>
              <label
                ><input type="checkbox" id="autoTimestamp" checked /> Auto on
                Submit</label
              >
            </div>
          </div>

          <div class="form-group boolean-group">
            <label
              ><input type="checkbox" id="punctuation" /> Punctuation</label
            >
            <label><input type="checkbox" id="numbers" /> Numbers</label>
            <label><input type="checkbox" id="lazyMode" /> Lazy Mode</label>
            <label><input type="checkbox" id="blindMode" /> Blind Mode</label>
            <label><input type="checkbox" id="bailedOut" /> Bailed Out</label>
            <label
              ><input type="checkbox" id="stopOnLetter" /> Stop On Letter</label
            >
          </div>

          <div class="form-group">
            <label>Restart Count</label
            ><input type="number" id="restartCount" required />
          </div>
          <div class="form-group">
            <label>Incomplete Test Seconds</label
            ><input
              type="number"
              step="0.01"
              id="incompleteTestSeconds"
              required
            />
          </div>
          <div class="form-group full-width">
            <label>Incomplete Tests (JSON array)</label
            ><input
              type="text"
              id="incompleteTests"
              required
              placeholder='[{"acc":55.56,"seconds":0.23}]'
            />
          </div>
          <div class="form-group full-width">
            <label>Tags (JSON array)</label
            ><input
              type="text"
              id="tags"
              required
              placeholder='["tag1","tag2"] or []'
            />
          </div>

          <div class="form-group full-width">
            <label>Key Spacing (comma sep)</label
            ><textarea id="keySpacing" required></textarea>
          </div>
          <div class="form-group full-width">
            <label>Key Duration (comma sep)</label
            ><textarea id="keyDuration" required></textarea>
          </div>

          <div class="form-group">
            <label>Key Overlap</label
            ><input type="number" step="0.01" id="keyOverlap" required />
          </div>
          <div class="form-group">
            <label>Last Key To End</label
            ><input type="number" id="lastKeyToEnd" required />
          </div>
          <div class="form-group">
            <label>Start To First Key</label
            ><input type="number" id="startToFirstKey" required />
          </div>

          <div class="form-group">
            <label>Consistency</label
            ><input type="number" step="0.01" id="consistency" required />
          </div>
          <div class="form-group">
            <label>WPM Consistency</label
            ><input type="number" step="0.01" id="wpmConsistency" required />
          </div>
          <div class="form-group">
            <label>Key Consistency</label
            ><input type="number" step="0.01" id="keyConsistency" required />
          </div>

          <div class="form-group full-width">
            <label>Funbox (JSON array)</label
            ><input type="text" id="funbox" required placeholder="[]" />
          </div>

          <div class="form-group full-width">
            <label>Chart Data (JSON object)</label
            ><textarea id="chartData" required></textarea>
          </div>

          <div class="form-group">
            <label>Test Duration (s)</label
            ><input type="number" step="0.01" id="testDuration" required />
          </div>
          <div class="form-group">
            <label>AFK Duration</label
            ><input type="number" id="afkDuration" required />
          </div>
          <div class="form-group">
            <label>UID</label><input type="text" id="uid" required />
          </div>
          <div class="form-group full-width timestamp-group">
            <label>Hash</label>
            <div class="ts-controls">
              <input type="text" id="hash" />
              <label
                ><input type="checkbox" id="autoHash" checked /> Auto on
                Submit</label
              >
            </div>
          </div>
        </div>

        <button type="submit" id="submitBtn">Send Replay Request</button>
      </form>

      <div id="responseContainer" style="display: none">
        <h3>Response</h3>
        <pre id="responseBox"></pre>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/object-hash@3.0.0/dist/object_hash.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
